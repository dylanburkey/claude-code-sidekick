# PR Quality Check Workflow
# Runs comprehensive quality checks on PRs to dev branch
# Includes multi-model AI code review for consensus-based feedback

name: PR Quality Check

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # Job 1: Lint and Format
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CLI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: cli

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm format:check

      - name: Check JSDoc comments
        run: pnpm lint:jsdoc
        continue-on-error: true

  # Job 2: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install CLI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: cli

      - name: Run CLI tests
        run: pnpm test
        working-directory: cli

      - name: Install multi-model dependencies
        run: pnpm install --frozen-lockfile
        working-directory: tools/multi-model
        continue-on-error: true

  # Job 3: Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install CLI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: cli

      - name: Run npm audit
        run: pnpm audit --audit-level=high
        working-directory: cli
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          echo "Checking for potential secrets..."

          # Check for common secret patterns
          PATTERNS=(
            "sk-[a-zA-Z0-9]{20,}"
            "sk-ant-[a-zA-Z0-9-]+"
            "ghp_[a-zA-Z0-9]{36}"
            "AKIA[A-Z0-9]{16}"
            "password\s*=\s*['\"][^'\"]+['\"]"
          )

          FOUND_SECRETS=false

          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" --include="*.js" --include="*.ts" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".env.example"; then
              echo "⚠️  Potential secret pattern found: $pattern"
              FOUND_SECRETS=true
            fi
          done

          if [ "$FOUND_SECRETS" = true ]; then
            echo "::warning::Potential secrets detected. Please review."
          else
            echo "✅ No obvious secrets detected"
          fi

  # Job 4: Code Quality Analysis
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed JS/TS files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|ts|jsx|tsx)$' | grep -v node_modules || true)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for redundant code
        run: |
          echo "Checking for code redundancy..."

          # Check for duplicate imports
          for file in $(find . -name "*.js" -o -name "*.ts" | grep -v node_modules); do
            DUPES=$(grep "^import" "$file" 2>/dev/null | sort | uniq -d)
            if [ -n "$DUPES" ]; then
              echo "⚠️  Duplicate imports in $file:"
              echo "$DUPES"
            fi
          done

          echo "✅ Redundancy check complete"

      - name: Check file sizes
        run: |
          echo "Checking for large files..."

          # Find JS/TS files larger than 500 lines
          find . -name "*.js" -o -name "*.ts" | grep -v node_modules | while read file; do
            LINES=$(wc -l < "$file")
            if [ "$LINES" -gt 500 ]; then
              echo "⚠️  Large file: $file ($LINES lines)"
            fi
          done

          echo "✅ File size check complete"

  # Job 5: Multi-Model AI Review (when secrets available)
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install multi-model dependencies
        run: pnpm install --frozen-lockfile
        working-directory: tools/multi-model
        continue-on-error: true

      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|ts|jsx|tsx)$' | grep -v node_modules | head -5)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Run AI Review
        if: ${{ env.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🤖 Running multi-model AI code review..."

          cd tools/multi-model

          # Review changed files (limit to 5 for cost control)
          for file in ${{ steps.changed.outputs.files }}; do
            if [ -f "../../$file" ]; then
              echo "Reviewing $file..."
              node bin/review.js "../../$file" --quick --json >> ../../review-results.json 2>/dev/null || true
            fi
          done

          echo "✅ AI review complete"

      - name: Post Review Summary
        if: ${{ hashFiles('review-results.json') != '' }}
        run: |
          if [ -f review-results.json ]; then
            echo "## 🤖 AI Code Review Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Parse and display results
            if command -v jq &> /dev/null; then
              ISSUES=$(jq -r '.confirmedIssues | length' review-results.json 2>/dev/null || echo "0")
              echo "**Confirmed Issues:** $ISSUES" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # Job 6: Summary
  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, quality]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## PR Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ **Some required checks failed. Please fix before merging.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All required checks passed!**" >> $GITHUB_STEP_SUMMARY
          fi
